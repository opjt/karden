<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!--
    Pixel art K — 6px pixels, 4×5 grid
    offset x=4, y=1

    col: 0  1  2  3
    row 0: ■  ·  ·  ■
    row 1: ■  ·  ■  ·
    row 2: ■  ■  ·  ·
    row 3: ■  ·  ■  ·
    row 4: ■  ·  ·  ■
  -->

  <!-- col 0: vertical bar -->
  <rect x="4"  y="1"  width="6" height="6" fill="#f1f5f9"/>
  <rect x="4"  y="7"  width="6" height="6" fill="#f1f5f9"/>
  <rect x="4"  y="13" width="6" height="6" fill="#f1f5f9"/>
  <rect x="4"  y="19" width="6" height="6" fill="#f1f5f9"/>
  <rect x="4"  y="25" width="6" height="6" fill="#f1f5f9"/>

  <!-- upper diagonal -->
  <rect x="22" y="1"  width="6" height="6" fill="#f1f5f9"/>
  <rect x="16" y="7"  width="6" height="6" fill="#f1f5f9"/>
  <rect x="10" y="13" width="6" height="6" fill="#f1f5f9"/>

  <!-- lower diagonal -->
  <rect x="16" y="19" width="6" height="6" fill="#f1f5f9"/>
  <rect x="22" y="25" width="6" height="6" fill="#f1f5f9"/>
</svg>
