<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1f2e"/>

  <!--
    Pixel art K — 4px pixels, 5×7 grid
    offset x=6, y=2

    col: 0  1  2  3  4
    row 0: ■  ·  ·  ·  ■
    row 1: ■  ·  ·  ■  ·
    row 2: ■  ·  ■  ·  ·
    row 3: ■  ■  ·  ·  ·
    row 4: ■  ·  ■  ·  ·
    row 5: ■  ·  ·  ■  ·
    row 6: ■  ·  ·  ·  ■
  -->

  <!-- Left vertical bar -->
  <rect x="6"  y="2"  width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="6"  width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="10" width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="14" width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="18" width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="22" width="4" height="4" fill="#e2e8f0"/>
  <rect x="6"  y="26" width="4" height="4" fill="#e2e8f0"/>

  <!-- Junction pixel -->
  <rect x="10" y="14" width="4" height="4" fill="#e2e8f0"/>

  <!-- Upper diagonal (top-right spread) -->
  <rect x="22" y="2"  width="4" height="4" fill="#7dd3fc"/>
  <rect x="18" y="6"  width="4" height="4" fill="#e2e8f0"/>
  <rect x="14" y="10" width="4" height="4" fill="#e2e8f0"/>

  <!-- Lower diagonal (bottom-right spread) -->
  <rect x="14" y="18" width="4" height="4" fill="#e2e8f0"/>
  <rect x="18" y="22" width="4" height="4" fill="#e2e8f0"/>
  <rect x="22" y="26" width="4" height="4" fill="#7dd3fc"/>
</svg>
